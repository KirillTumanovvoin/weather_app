<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Погода в городах России</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <!-- Навигация -->
    <nav class="site-nav">
      <a href="{{ url_for('index') }}" class="nav-brand"> Погода по городам </a>
    </nav>

    <!-- Основной контент -->
    <div class="page-wrap">
      <div class="page-header">
        <h1>Выберите город</h1>
        <p>Текущая погода и рекомендации по одежде для городов России</p>
      </div>

      <!-- Поиск -->
      <div class="search-wrap">
        <!-- иконка лупы -->
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Поиск города..."
          autocomplete="off"
        />
      </div>

      <!-- Сетка городов -->
      <div class="cities-grid" id="citiesGrid">
        {% for city_name, city_data in cities.items() %}
        <a
          href="{{ url_for('weather', city_name=city_name) }}"
          class="city-card"
          data-city="{{ city_name }}"
        >
          <div class="city-name">{{ city_name }}</div>
          <div class="city-tz">
            {{ city_data.tz.split('/')[-1].replace('_', ' ') }}
          </div>
          <!-- стрелка вправо -->
          <svg
            class="city-arrow"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polyline points="9 18 15 12 9 6" />
          </svg>
        </a>
        {% endfor %}
      </div>

      <!-- Ничего не найдено -->
      <div class="no-results" id="noResults">Ничего не найдено</div>
    </div>

    <!-- Подвал -->
    <footer class="site-footer">
      Данные:
      <a href="https://openweathermap.org" target="_blank" rel="noopener"
        >OpenWeatherMap</a
      >
      &nbsp;&middot;&nbsp; Flask &amp; Python
    </footer>

    <script>
      /* Живой поиск по городам */
      const input = document.getElementById("searchInput");
      const cards = document.querySelectorAll(".city-card");
      const noRes = document.getElementById("noResults");

      input.addEventListener("input", function () {
        const q = this.value.toLowerCase().trim();
        let visible = 0;
        cards.forEach((card) => {
          const match = card.dataset.city.toLowerCase().includes(q);
          card.style.display = match ? "" : "none";
          if (match) visible++;
        });
        noRes.style.display = visible === 0 ? "block" : "none";
      });
    </script>
  </body>
</html>
